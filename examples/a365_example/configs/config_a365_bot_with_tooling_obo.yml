#
# A365 worker-agent bot (Teams / Bot Framework) + MCP tools + A365 telemetry
# using the Agentic/OBO observability auth handler.
#
# Use this only as a controlled experiment for Microsoft Agent 365 observability
# debugging. The worker/S2S path remains config_a365_bot_with_tooling.yml.

general:
  telemetry:
    logging:
      console:
        _type: console
        level: INFO
    tracing:
      a365:
        _type: a365
        agent_id: "d734986e-5087-4b93-af06-efb1834504ad"
        tenant_id: "06938c20-42d5-4112-9f91-643dff159d7f"
        token_resolver: "a365_observability_auth"
        cluster_category: "prod"
        use_s2s_endpoint: false
  front_end:
    _type: a365
    host: "0.0.0.0"
    port: 3978
    observability_auth_handler_id: AGENTIC
    app_id: ${A365_APP_ID}
    app_password: ${A365_APP_PASSWORD}
    tenant_id: "06938c20-42d5-4112-9f91-643dff159d7f"
    enable_notifications: false

authentication:
  a365_observability_auth:
    _type: oauth2_auth_code_flow
    client_id: ${A365_APP_ID}
    client_secret: ${A365_APP_PASSWORD}
    authorization_url: https://login.microsoftonline.com/06938c20-42d5-4112-9f91-643dff159d7f/oauth2/v2.0/authorize
    token_url: https://login.microsoftonline.com/06938c20-42d5-4112-9f91-643dff159d7f/oauth2/v2.0/token
    redirect_uri: http://localhost/a365/observability/callback
    scopes:
      - api://9b975845-388f-4429-889e-eab1ef63949c/Agent365.Observability.OtelWrite
    use_pkce: false
  a365_mcp_auth:
    _type: api_key
    raw_key: ${A365_MCP_TOKEN}
    auth_scheme: Bearer

function_groups:
  graph_mail:
    _type: mcp_client
    server:
      transport: streamable-http
      url: "https://graph-mail-mcp.blackocean-072fa40d.eastus.azurecontainerapps.io/mcp"
      auth_provider: a365_mcp_auth
  jira:
    _type: mcp_client
    server:
      transport: streamable-http
      url: "https://jira-mcp.blackocean-072fa40d.eastus.azurecontainerapps.io/mcp"
      auth_provider: a365_mcp_auth
  github:
    _type: mcp_client
    server:
      transport: streamable-http
      url: "https://github-mcp.blackocean-072fa40d.eastus.azurecontainerapps.io/mcp"
      auth_provider: a365_mcp_auth
  transcripts:
    _type: mcp_client
    server:
      transport: streamable-http
      url: "https://transcript-mcp.blackocean-072fa40d.eastus.azurecontainerapps.io/mcp"
      auth_provider: a365_mcp_auth
functions:
  current_datetime:
    _type: current_datetime

llms:
  nim_llm:
    _type: nim
    model_name: nvidia/nemotron-3-nano-30b-a3b
    temperature: 0.0
    max_tokens: 1024
    chat_template_kwargs:
      enable_thinking: false

workflow:
  _type: react_agent
  tool_names: [current_datetime, graph_mail, jira, github, transcripts]
  llm_name: nim_llm
  verbose: true
  parse_agent_response_max_retries: 3
