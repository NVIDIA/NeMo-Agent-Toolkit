#
# A365 worker-agent bot (Teams / Bot Framework) + MCP tools + A365 telemetry.
#
# Lane: s2s_runtime_agent_app_token
#
# Purpose:
# - Use the Agent 365 service-to-service observability endpoint.
# - Use the runtime / hired agentic app instance ID in the telemetry URL.
# - Use the app-only service principal bearer token from A365_BEARER_TOKEN.
# - Do not exchange or cache an AGENTIC/UserPrincipal token for observability.
#
# Expected telemetry request:
#   /observabilityService/tenants/06938c20-42d5-4112-9f91-643dff159d7f/otlp/agents/ee336298-1d98-4e0d-9aa1-7be4439cea98/traces
#
# Expected token:
# - caller app/client id: a185cf21-03c8-4bf1-919a-ec8f0782118d
# - audience: 9b975845-388f-4429-889e-eab1ef63949c
# - roles includes: Agent365.Observability.OtelWrite
#
# Run: nat start a365 --config_file configs/config_a365_bot_with_tooling_s2s_runtime_agent.yml

general:
  telemetry:
    logging:
      console:
        _type: console
        level: INFO
    tracing:
      a365:
        _type: a365
        observability_lane: "s2s_runtime_agent_app_token"
        agent_id: "ee336298-1d98-4e0d-9aa1-7be4439cea98"
        tenant_id: "06938c20-42d5-4112-9f91-643dff159d7f"
        token_resolver: "a365_observability_auth"
        cluster_category: "prod"
        use_s2s_endpoint: true
  front_end:
    _type: a365
    host: "0.0.0.0"
    port: 3978
    app_id: ${A365_APP_ID}
    app_password: ${A365_APP_PASSWORD}
    tenant_id: "06938c20-42d5-4112-9f91-643dff159d7f"
    enable_notifications: false

authentication:
  a365_observability_auth:
    _type: api_key
    raw_key: ${A365_BEARER_TOKEN}
    auth_scheme: Bearer
  a365_mcp_auth:
    _type: api_key
    raw_key: ${A365_MCP_TOKEN}
    auth_scheme: Bearer

function_groups:
  graph_mail:
    _type: mcp_client
    server:
      transport: streamable-http
      url: "https://graph-mail-mcp.blackocean-072fa40d.eastus.azurecontainerapps.io/mcp"
      auth_provider: a365_mcp_auth
  jira:
    _type: mcp_client
    server:
      transport: streamable-http
      url: "https://jira-mcp.blackocean-072fa40d.eastus.azurecontainerapps.io/mcp"
      auth_provider: a365_mcp_auth
  github:
    _type: mcp_client
    server:
      transport: streamable-http
      url: "https://github-mcp.blackocean-072fa40d.eastus.azurecontainerapps.io/mcp"
      auth_provider: a365_mcp_auth
  transcripts:
    _type: mcp_client
    server:
      transport: streamable-http
      url: "https://transcript-mcp.blackocean-072fa40d.eastus.azurecontainerapps.io/mcp"
      auth_provider: a365_mcp_auth

functions:
  current_datetime:
    _type: current_datetime

llms:
  nim_llm:
    _type: nim
    model_name: nvidia/nemotron-3-nano-30b-a3b
    temperature: 0.0
    max_tokens: 1024
    chat_template_kwargs:
      enable_thinking: false

workflow:
  _type: react_agent
  tool_names: [current_datetime, graph_mail, jira, github, transcripts]
  llm_name: nim_llm
  verbose: true
  parse_agent_response_max_retries: 3
