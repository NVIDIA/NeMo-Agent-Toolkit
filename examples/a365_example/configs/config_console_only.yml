#
# Console-only config (no A365 package required). Use when nvidia-nat-a365 is not installed.
# Run: nat serve --config_file configs/config_console_only.yml

general:
  telemetry:
    logging:
      console:
        _type: console
        level: INFO
  front_end:
    _type: console

function_groups: {}

functions:
  current_datetime:
    _type: current_datetime

llms:
  nim_llm:
    _type: nim
    model_name: nvidia/nemotron-3-nano-30b-a3b
    temperature: 0.0
    max_tokens: 256
    chat_template_kwargs:
      enable_thinking: false

workflow:
  _type: react_agent
  tool_names: [current_datetime]
  llm_name: nim_llm
  verbose: true
  parse_agent_response_max_retries: 3
