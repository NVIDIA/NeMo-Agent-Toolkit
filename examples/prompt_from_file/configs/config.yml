# Example: File-Based Prompt Loading
# This config loads prompts from external files using file:// prefix

llms:
  nim_llm:
    _type: nim
    model_name: meta/llama-3.1-70b-instruct
    temperature: 0.0
    max_tokens: 1024

function_groups:
  calculator:
    _type: calculator

workflow:
  _type: react_agent
  tool_names: [calculator]
  llm_name: nim_llm
  # Load system prompt from external file (file:// works for keys ending in "prompt")
  system_prompt: file://../prompts/system_prompt.txt
  verbose: true
  retry_agent_response_parsing_errors: true
  parse_agent_response_max_retries: 3
