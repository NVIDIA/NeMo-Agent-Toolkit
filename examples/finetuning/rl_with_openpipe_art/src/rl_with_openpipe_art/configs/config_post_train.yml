llms:
  openpipe_llm:
    _type: openai
    # Model name should be the same as the trainer adapter config base_model
    model_name: Qwen/Qwen2.5-7B-Instruct
    base_url: http://localhost:8000/v1
    api_key: default
    temperature: 0.5

workflow:
  _type: rl_with_openpipe_art
  player_model: openpipe_llm

eval:
  general:
    max_concurrency: 16
    output_dir: .tmp/nat/examples/rl_openpipe/eval/post_train
    dataset:
      _type: json
      file_path: examples/finetuning/rl_with_openpipe_art/data/data.json

  evaluators:
    rl_accuracy:
      _type: rl_accuracy

