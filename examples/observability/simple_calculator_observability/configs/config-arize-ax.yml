# Arize AX: set ARIZE_SPACE_ID, ARIZE_API_KEY, and optional ARIZE_PROJECT_NAME
# (default project name below is simple_calculator). For EU, set use_eu_region: true.
# See: https://arize.com/docs/ax/integrations/opentelemetry/opentelemetry-arize-otel

general:
  telemetry:
    logging:
      console:
        _type: console
        level: WARN
      file:
        _type: file
        path: ./.tmp/nat_simple_calculator.log
        level: DEBUG
    tracing:
      arize_ax:
        _type: arize_ax
        project: ${ARIZE_PROJECT_NAME:-simple_calculator}
        space_id: ${ARIZE_SPACE_ID}
        api_key: ${ARIZE_API_KEY}
        protocol: grpc
        use_eu_region: false

  front_end:
    _type: fastapi
    endpoints:
      - path: /get_time
        method: POST
        description: Gets the current time
        function_name: current_datetime
    cors:
      allow_origins: ['*']

function_groups:
  calculator:
    _type: calculator

functions:
  current_datetime:
    _type: current_datetime

llms:
  nim_llm:
    _type: nim
    model_name: nvidia/nemotron-3-nano-30b-a3b
    temperature: 0.0
    max_tokens: 1024


workflow:
  _type: react_agent
  tool_names: [calculator, current_datetime]
  llm_name: nim_llm
  verbose: true
  parse_agent_response_max_retries: 3
