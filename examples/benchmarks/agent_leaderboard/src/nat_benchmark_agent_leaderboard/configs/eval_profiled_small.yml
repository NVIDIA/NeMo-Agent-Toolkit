# Agent Leaderboard v2 — Banking domain — Small Model Only (Qwen/Qwen3.5-35B-A3B-FP8)
#
# 100 scenarios in the banking domain. Targets the 35B MoE worker directly.
#
# Usage: nat eval --config_file examples/benchmarks/agent_leaderboard/configs/eval_profiled_small.yml

llms:
  dynamo_llm:
    _type: dynamo
    model_name: Qwen/Qwen3.5-35B-A3B-FP8
    base_url: ${DYNAMO_BASE_URL:-http://localhost:8000/v1}
    api_key: ${DYNAMO_API_KEY:-dummy}
    max_tokens: 1024
    temperature: 0.0
    enable_nvext_hints: true
    nvext_prefix_id_template: "agent-lb-small-{uuid}"
    nvext_prefix_total_requests: 10
    nvext_prefix_osl: MEDIUM
    nvext_prefix_iat: MEDIUM

workflow:
  _type: agent_leaderboard_workflow
  llm_name: dynamo_llm
  max_steps: 10

eval:
  general:
    output_dir: .tmp/nat/benchmarks/agent_leaderboard/banking_profiled_small/
    workflow_alias: agent_leaderboard_banking_small
    per_input_user_id: false
    max_concurrency: 3
    dataset:
      _type: agent_leaderboard
      file_path: ${AGENT_LEADERBOARD_DATA:-./data/agent_leaderboard_v2_banking.json}
      domains:
        - banking
      limit: ${AGENT_LEADERBOARD_LIMIT:-}
      structure:
        question_key: question
        answer_key: answer

    profiler:
      compute_llm_metrics: true
      token_uniqueness_forecast: true
      workflow_runtime_forecast: true
      csv_exclude_io_text: true
      prompt_caching_prefixes:
        enable: true
        min_frequency: 0.1
      bottleneck_analysis:
        enable_nested_stack: true
      concurrency_spike_analysis:
        enable: true
        spike_threshold: 6
      prediction_trie:
        enable: true
      dynamo_metrics:
        enable: true
        prometheus_url: ${PROMETHEUS_URL:-http://localhost:9090}
        query_range: 30s
        collect_kv_cache: true
        collect_ttft: true
        collect_itl: true
        collect_inflight_requests: true
        collect_throughput: true
        collect_token_throughput: true

  evaluators:
    tsq:
      _type: agent_leaderboard_tsq
      tool_weight: 1.0
      parameter_weight: 0.0
