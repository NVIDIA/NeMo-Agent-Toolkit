# ToolTalk Easy Split — Multi-turn function calling evaluation
# Usage: nat eval --config_file examples/benchmarks/tooltalk/configs/eval_easy.yml

llms:
  nim_llm:
    _type: nim
    model_name: meta/llama-3.3-70b-instruct
    base_url: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
    api_key: ${NVIDIA_API_KEY}
    max_tokens: 1024
    temperature: 0.0

workflow:
  _type: tooltalk_workflow
  llm_name: nim_llm
  database_dir: ${TOOLTALK_DATABASE_DIR}
  api_mode: all
  max_tool_calls_per_turn: 5

eval:
  general:
    output_dir: .tmp/nat/benchmarks/tooltalk/easy/
    workflow_alias: tooltalk_easy
    per_input_user_id: true
    max_concurrency: 3
    dataset:
      _type: tooltalk
      file_path: ${TOOLTALK_DATASET_DIR}
      database_dir: ${TOOLTALK_DATABASE_DIR}
      structure:
        question_key: question
        answer_key: answer

  evaluators:
    tooltalk:
      _type: tooltalk_evaluator
      database_dir: ${TOOLTALK_DATABASE_DIR}
