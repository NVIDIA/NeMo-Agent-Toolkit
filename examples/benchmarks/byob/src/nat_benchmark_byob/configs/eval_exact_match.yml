# BYOB — Exact Match benchmark evaluation
# Usage: nat eval --config_file examples/benchmarks/byob/configs/eval_exact_match.yml
#
# This config uses any NAT workflow and scores its output against a
# BYOB benchmark definition using the exact_match scorer.

llms:
  nim_llm:
    _type: nim
    model_name: meta/llama-3.3-70b-instruct
    base_url: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
    api_key: ${NVIDIA_API_KEY}
    max_tokens: 256
    temperature: 0.0

workflow:
  _type: tool_calling_agent
  llm_name: nim_llm
  tool_names: []

eval:
  general:
    output_dir: .tmp/nat/benchmarks/byob/exact_match/
    workflow_alias: byob_exact_match
    per_input_user_id: false
    max_concurrency: 5
    dataset:
      _type: byob
      file_path: placeholder
      benchmark_module: ${BYOB_BENCHMARK_MODULE}
      benchmark_name: ${BYOB_BENCHMARK_NAME}
      structure:
        question_key: question
        answer_key: answer

  evaluators:
    byob:
      _type: byob_evaluator
      benchmark_module: ${BYOB_BENCHMARK_MODULE}
      benchmark_name: ${BYOB_BENCHMARK_NAME}
      score_field: correct
