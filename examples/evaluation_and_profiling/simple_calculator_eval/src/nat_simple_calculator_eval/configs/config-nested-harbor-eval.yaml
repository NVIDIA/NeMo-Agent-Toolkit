#
# Harbor-ready nested workflow config:
#   react_agent -> power_of_two -> calculator__multiply
#
# This config intentionally omits NAT eval/telemetry sections so Harbor can run
# the workflow directly via nemo-agent wrapper.

function_groups:
  calculator:
    _type: calculator

functions:
  power_of_two:
    _type: power_of_two
    multiply_fn: calculator__multiply

llms:
  nim_llm:
    _type: nim
    model_name: nvidia/nemotron-3-nano-30b-a3b
    temperature: 0.0
    max_tokens: 1024
    chat_template_kwargs:
      enable_thinking: false

workflow:
  _type: react_agent
  tool_names: [power_of_two]
  llm_name: nim_llm
  verbose: true
  parse_agent_response_max_retries: 3
