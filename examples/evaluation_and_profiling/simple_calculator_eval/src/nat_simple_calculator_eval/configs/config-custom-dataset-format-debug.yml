function_groups:
  calculator:
    _type: calculator

functions:
  current_datetime:
    _type: current_datetime

llms:
  nim_llm:
    _type: nim
    model_name: meta/llama-3.1-70b-instruct
    temperature: 0.2
    max_tokens: 2048
  eval_llm:
    _type: nim
    model_name: nvidia/llama-3.3-nemotron-super-49b-v1
    thinking: true
    temperature: 0.0
    max_tokens: 2000

workflow:
  _type: react_agent
  tool_names: [calculator, current_datetime]
  llm_name: nim_llm
  verbose: true
  retry_agent_response_parsing_errors: true
  parse_agent_response_max_retries: 3


eval:
  general:
    max_concurrency: 1
    output_dir: .tmp/nat/examples/simple_calculator/eval
    dataset:
      _type: custom
      file_path: examples/evaluation_and_profiling/simple_calculator_eval/data/simple_calculator_nested.json
      function: nat_simple_calculator_eval.scripts.custom_dataset_parser.extract_nested_questions
      kwargs:
        difficulty: "medium"
        max_rows: 5

  evaluators:
    exact_match_eval:
      _type: langsmith
      evaluator: exact_match
    correctness_judge:
      _type: langsmith_judge
      llm_name: eval_llm
      prompt: correctness
      feedback_key: correctness
      continuous: true
      use_reasoning: true      