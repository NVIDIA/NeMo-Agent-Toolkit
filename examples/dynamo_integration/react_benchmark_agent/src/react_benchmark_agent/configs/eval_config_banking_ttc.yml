# =============================================================================
# ⚠️  EXPERIMENTAL: TEST TIME COMPUTE (TTC) CONFIGURATION
# =============================================================================
# STATUS: Experimental - not yet part of any demos or benchmarks
#
# This configuration uses the experimental test_time_compute module which is
# still under active development. It may have known issues with:
# - Concurrent evaluation (max_concurrency must be 1)
# - Profiler compatibility (some features disabled)
# - Integration with certain evaluators
# =============================================================================
# This configuration uses the experimental test_time_compute module to:
# 1. Generate multiple execution plans in parallel using multi_llm_plan
# 2. Score each plan using llm_based_plan_scoring
# 3. Select the best plan using best_of_n_selection
# 4. Execute the agent with the selected plan
#
# This approach improves reasoning quality by exploring multiple solution paths
# before committing to execution, trading extra inference cycles for better
# tool selection accuracy.
# =============================================================================

functions:
  react_benchmark_agent:
    _type: react_benchmark_agent
    prefix: "Agent:"
    decision_only: true
    canned_response_template: "Successfully executed {tool_name}. Operation completed."

  # The base ReAct agent that will be augmented with TTC
  react_agent_executor:
    _type: react_agent
    llm_name: dynamo_llm
    tool_names: [
      banking_tools.get_account_balance,
      banking_tools.get_transaction_history,
      banking_tools.transfer_funds,
      banking_tools.get_loan_information,
      banking_tools.get_credit_card_information,
      banking_tools.get_mortgage_details,
      banking_tools.get_savings_account_products,
      banking_tools.schedule_appointment,
      banking_tools.check_loan_application_status,
      banking_tools.find_nearby_locations,
      banking_tools.get_investment_products,
      banking_tools.report_lost_stolen_card,
      banking_tools.update_contact_information,
      banking_tools.setup_automatic_bill_pay,
      banking_tools.initiate_transaction_dispute,
      banking_tools.get_exchange_rates,
      banking_tools.calculate_loan_payment,
      banking_tools.manage_account_alerts,
      banking_tools.check_wire_transfer_status,
      banking_tools.get_cd_products
    ]
    verbose: true
    parse_agent_response_max_retries: 3
    max_tool_calls: 20
    pass_tool_call_errors_to_agent: true
    recursion_limit: 50
    # Custom system prompt optimized for tool selection evaluation
    system_prompt: |
      You are a tool-calling agent evaluated on TOOL SELECTION capability. Your goal is to select the correct tools, in the correct order, to handle real-world use-cases.
      
      IMPORTANT: This is a tool selection exercise, NOT real execution.
      - Focus on selecting the RIGHT TOOL for each step
      - Use placeholder/dummy values for required parameters (e.g., "12345", "user@example.com", "2024-01-01")
      - Tool responses are simulated - ignore them and focus on selecting the next appropriate tool
      - What matters is YOUR INTENT and TOOL CHOICE, not the data quality
      
      Available tools:

      {tools}

      Use this exact format for EACH response:

      Thought: I need to analyze what the user needs and select the SINGLE NEXT tool to call
      Action: the ONE tool to call right now, must be one of [{tool_names}]
      Action Input: valid JSON with required parameters (use placeholder values)

      CRITICAL RULES:
      1. Output ONLY ONE Thought, Action, and Action Input per response
      2. STOP IMMEDIATELY after writing Action Input
      3. DO NOT write the Observation - the system will provide it
      4. DO NOT write multiple Thought/Action/Action Input cycles in one response
      5. After receiving the Observation, you will get another turn to select the next tool
      
      When you have called all necessary tools:
      Thought: I now know the final answer
      Final Answer: [brief summary of what was accomplished]

function_groups:
  banking_tools:
    _type: banking_tools_group
    tools_json_path: ./examples/dynamo_integration/data/raw/banking/tools.json
    decision_only: true
    include: [
      get_account_balance,
      get_transaction_history,
      transfer_funds,
      get_loan_information,
      get_credit_card_information,
      get_mortgage_details,
      get_savings_account_products,
      schedule_appointment,
      check_loan_application_status,
      find_nearby_locations,
      get_investment_products,
      report_lost_stolen_card,
      update_contact_information,
      setup_automatic_bill_pay,
      initiate_transaction_dispute,
      get_exchange_rates,
      calculate_loan_payment,
      manage_account_alerts,
      check_wire_transfer_status,
      get_cd_products
    ]

llms:
  # Primary LLM for agent execution and planning
  dynamo_llm:
    _type: dynamo
    model_name: llama-3.3-70b
    base_url: http://localhost:8099/v1
    api_key: dummy
    temperature: 0.0
    max_tokens: 8192
    stop: ["Observation:", "\nThought:"]
    # Dynamic prefix headers for KV cache optimization
    enable_dynamic_prefix: true
    prefix_template: "react-ttc-{uuid}"
    prefix_total_requests: 10
    prefix_osl: MEDIUM
    prefix_iat: MEDIUM

  # Second LLM instance with higher temperature for diverse plan generation
  dynamo_llm_creative:
    _type: dynamo
    model_name: llama-3.3-70b
    base_url: http://localhost:8099/v1
    api_key: dummy
    temperature: 0.5  # Higher temperature for more diverse plans
    max_tokens: 8192
    stop: ["Observation:", "\nThought:"]
    enable_dynamic_prefix: true
    prefix_template: "react-ttc-creative-{uuid}"
    prefix_total_requests: 10
    prefix_osl: MEDIUM
    prefix_iat: MEDIUM

  # Third LLM instance with medium temperature
  dynamo_llm_balanced:
    _type: dynamo
    model_name: llama-3.3-70b
    base_url: http://localhost:8099/v1
    api_key: dummy
    temperature: 0.15  # Medium temperature for balanced exploration
    max_tokens: 8192
    stop: ["Observation:", "\nThought:"]
    enable_dynamic_prefix: true
    prefix_template: "react-ttc-balanced-{uuid}"
    prefix_total_requests: 10
    prefix_osl: MEDIUM
    prefix_iat: MEDIUM

  # LLM for scoring plans (lower temperature for consistent evaluation)
  scoring_llm:
    _type: dynamo
    model_name: llama-3.3-70b
    base_url: http://localhost:8099/v1
    api_key: dummy
    temperature: 0.0
    max_tokens: 1024

  # LLM for TSQ evaluation
  eval_llm:
    _type: dynamo
    model_name: llama-3.3-70b
    base_url: http://localhost:8099/v1
    api_key: dummy
    temperature: 0.0
    max_tokens: 1024

# =============================================================================
# TEST TIME COMPUTE STRATEGIES
# =============================================================================
# These strategies define the TTC pipeline:
# Search (multi_llm_plan) -> Score (llm_based_plan_scoring) -> Select (best_of_n)
# =============================================================================
ttc_strategies:
  # Multi-LLM Plan Generation Strategy
  # Generates multiple execution plans using different LLM instances with
  # varying temperatures to explore diverse solution paths
  multi_llm_planner:
    _type: multi_llm_plan
    llms:
      - dynamo_llm           # Conservative plans (temp=0.0)
      - dynamo_llm_balanced  # Balanced plans (temp=0.3)
      - dynamo_llm_creative  # Creative plans (temp=0.7)
    plans_per_llm: 2         # Generate 2 plans per LLM = 6 total plans
    min_temperature: 0.3     # Additional temperature variation per plan
    max_temperature: 0.8
    # Uses default planning_template - expects {context} and {prompt} variables

  # LLM-Based Plan Scoring Strategy
  # Evaluates each generated plan on quality, completeness, and relevance
  plan_scorer:
    _type: llm_based_plan_scoring
    scoring_llm: scoring_llm
    # Uses default scoring_template - expects {original_prompt}, {context}, and {plan} variables

  # Best-of-N Selection Strategy
  # Selects the highest-scored plan from the candidates
  best_of_n_selector:
    _type: best_of_n_selection

# =============================================================================
# WORKFLOW CONFIGURATION
# =============================================================================
# The workflow uses plan_select_execute_function to:
# 1. Generate multiple plans using multi_llm_planner
# 2. Score each plan using plan_scorer
# 3. Select the best plan using best_of_n_selector
# 4. Execute the react_agent_executor with the selected plan
# =============================================================================
workflow:
  _type: plan_select_execute_function
  augmented_fn: react_agent_executor
  planner: multi_llm_planner
  scorer: plan_scorer
  selector: best_of_n_selector
  verbose: true
  agent_context_prompt_template: |
    The agent system is a banking assistant that helps customers with:
    - Account inquiries (balances, transactions, statements)
    - Fund transfers and payments
    - Loan and credit card information
    - Investment products and mortgage details
    - Customer service (appointments, alerts, disputes)
    
    System Description:
    {description}
    
    Available Tools:
    {tools}
  downstream_template: |
    Answer the following banking-related question: {input_text}

    Here is the recommended execution plan to follow:

    {reasoning_output}

    IMPORTANT: Follow the plan above to select the appropriate tools in order.
    Remember to use the exact ReAct format (Thought/Action/Action Input) for each step.
    You must respond with the answer to the original question directly to the user.

eval:
  general:
    # IMPORTANT: Set to 1 to avoid "cannot reuse already awaited coroutine" error
    # This is a known limitation when using TTC with eval - TTC's internal parallelism
    # conflicts with eval's concurrent item processing
    max_concurrency: 1
    
    output:
      dir: ./examples/dynamo_integration/react_benchmark_agent/outputs/dynamo_evals/ttc_best_of_n/
      cleanup: false
      job_management:
        append_job_id_to_output_dir: true
    
    dataset:
      _type: json
      file_path: ./examples/dynamo_integration/data/agent_leaderboard_v2_banking.json
      structure:
        disable: true
    
    # Profiler disabled for TTC workflows - TTC functions don't emit
    # LLM traces in the expected format for some profiler features
    profiler:
      compute_llm_metrics: false
      token_uniqueness_forecast: false
      workflow_runtime_forecast: false
      csv_exclude_io_text: true
      prompt_caching_prefixes:
        enable: false
      bottleneck_analysis:
        enable_nested_stack: false
      concurrency_spike_analysis:
        enable: false

  evaluators:
    tool_selection_quality:
      _type: tsq_evaluator
      llm_name: eval_llm
      strict_mode: false
      tool_weight: 1.0
      parameter_weight: 0.0

# =============================================================================
# OPTIMIZER CONFIGURATION
# =============================================================================
optimizer:
  output_path: ./examples/dynamo_integration/react_benchmark_agent/outputs/dynamo_evals/ttc_best_of_n/optimizer_results/
  reps_per_param_set: 1
  
  eval_metrics:
    tool_selection_quality:
      evaluator_name: tool_selection_quality
      direction: maximize
      weight: 1.0
  
  numeric:
    enabled: true
    n_trials: 5
    sampler: grid
  
  prompt:
    enabled: false

