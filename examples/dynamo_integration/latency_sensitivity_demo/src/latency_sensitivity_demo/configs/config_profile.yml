# =============================================================================
# PROFILER CONFIGURATION - Latency Sensitivity Demo (NIM LLM)
# =============================================================================
# Purpose: Build a prediction trie with auto-sensitivity scores using NIM
#
# Each LangGraph node is a registered NAT function with its own profiler span,
# so the trie captures per-node metrics and the auto-sensitivity algorithm can
# differentiate nodes by position, fan-out, critical path, and parallel slack.
#
# Usage:
#   nat eval --config_file examples/dynamo_integration/latency_sensitivity_demo/src/latency_sensitivity_demo/configs/config_profile.yml
#
# Output: prediction_trie.json in the output directory
# =============================================================================

functions:
  classify_query:
    _type: classify_query
    llm: nim_llm
  research_context:
    _type: research_context
    llm: nim_llm
  lookup_policy:
    _type: lookup_policy
    llm: nim_llm
  draft_response:
    _type: draft_response
    llm: nim_llm
  review_response:
    _type: review_response
    llm: nim_llm

llms:
  nim_llm:
    _type: nim
    model_name: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
    temperature: 0.0
    max_tokens: 1024

workflow:
  _type: latency_sensitivity_demo
  classify_fn: classify_query
  research_fn: research_context
  policy_fn: lookup_policy
  draft_fn: draft_response
  review_fn: review_response

eval:
  general:
    max_concurrency: 4
    output:
      dir: ./examples/dynamo_integration/latency_sensitivity_demo/outputs/profile/
      cleanup: false
      job_management:
        append_job_id_to_output_dir: true
    dataset:
      _type: json
      file_path: ./examples/dynamo_integration/latency_sensitivity_demo/src/latency_sensitivity_demo/data/customer_queries.json
    profiler:
      compute_llm_metrics: true
      csv_exclude_io_text: true
      prediction_trie:
        enable: true
        auto_sensitivity: true
        sensitivity_scale: 5
        # Tuned weights for clear differentiation across the workflow topology:
        #   - w_position=0.5: first/last nodes score HIGH (U-shaped)
        #   - w_critical=0.35: long-running nodes score higher
        #   - w_fanout=0.15: entry node with many downstream calls gets a boost
        #   - w_parallel=0.5: strongly penalize parallel siblings with slack
        w_critical: 0.35
        w_fanout: 0.15
        w_position: 0.5
        w_parallel: 0.5
