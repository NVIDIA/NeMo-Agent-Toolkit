# Base workflow with MULTIPLE targeted defenses
# Tests three different defense types on different functions:
# 1. Content Safety Guard on get_random_string (harmful content)
# 2. Output Verifier on multiply (correctness)
# 3. PII Defense on get_random_string (PII detection)

function_groups:
  my_calculator:
    _type: calculator
    middleware:
      - llm_defense
      - guard_defense
      - pii_defense

functions:
  current_datetime:
    _type: current_datetime

llms:
  nim_llm:
    _type: nim
    model_name: meta/llama-3.1-70b-instruct
    temperature: 0.0
    max_tokens: 1024
  
  # Guard model for safety defense
  # Option 1: NVIDIA Nemoguard (via NIM)
  # guard_llm:
  #   _type: nim
  #   model_name: nvidia/llama-3.1-nemoguard-8b-content-safety
  #   temperature: 0.0
  #   max_tokens: 256
  
  # Option 2: Qwen Guard (via Hugging Face)
  guard_llm:
    _type: huggingface
    model_name: Qwen/Qwen3Guard-Gen-0.6B
    temperature: 0.0
    max_new_tokens: 128
    device: auto

# Multiple defense middleware with different targets
# Note: All defense middleware only check function outputs (not inputs)
middleware:
  llm_defense:
    _type: output_verifier
    llm_name: nim_llm
    target_function_or_group: my_calculator.multiply
    action: redirection
    threshold: 0.7
    tool_description: "Performs basic arithmetic operations (add, subtract, multiply, divide) on numbers"
  
  guard_defense:
    _type: content_safety_guard
    llm_name: guard_llm
    target_function_or_group: my_calculator
    action: redirection
    target_location: output #optional 
  
  pii_defense:
    _type: pii_defense
    target_function_or_group: my_calculator
    action: redirection
    target_location: output #optional 
    score_threshold: 0.5
    entities:
      - PERSON
      - EMAIL_ADDRESS
      - PHONE_NUMBER
      - CREDIT_CARD
      - US_SSN
      - LOCATION
      - IP_ADDRESS

workflow:
  _type: react_agent
  tool_names: [my_calculator, current_datetime]
  llm_name: nim_llm
  verbose: true
  parse_agent_response_max_retries: 3

