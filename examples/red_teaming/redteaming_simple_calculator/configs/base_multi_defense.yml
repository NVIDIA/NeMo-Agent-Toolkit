# Base workflow with MULTIPLE targeted defenses
# Tests three different defense types on different functions:
# 1. Content Safety Guard on get_random_string (harmful content)
# 2. Output Verifier on multiply (correctness)
# 3. PII Defense on get_random_string (PII detection)

function_groups:
  my_calculator:
    _type: calculator
    middleware:
      - llm_defense     

functions:
  current_datetime:
    _type: current_datetime

llms:
  nim_llm:
    _type: nim
    model_name: meta/llama-3.1-70b-instruct
    temperature: 0.0
    max_tokens: 1024
  
  # Guard model for safety defense
  guard_llm:
    _type: nim
    model_name: meta/llama-3.1-8b-instruct
    temperature: 0.0
    max_tokens: 256

# Multiple defense middleware with different targets
middleware:
  llm_defense:
    _type: output_verifier
    llm_name: nim_llm
    target_function_or_group: my_calculator  
    action: log
    threshold: 0.7
    system_prompt: |
      Validate calculator output correctness. Return JSON:
      {
        "threat_detected": true/false,
        "confidence": 0.0-1.0,
        "reason": "brief explanation",
        "correct_answer": "correct numeric value if wrong, null if correct"
      }
  
  guard_defense:
    _type: content_safety_guard
    llm_name: guard_llm
    target_function_or_group: my_calculator
    action: block  

  pii_defense:
    _type: pii_defense
    target_function_or_group: my_calculator          
    action: sanitize                                         
    score_threshold: 0.01                                    
    entities:
      - PERSON
      - EMAIL_ADDRESS
      - PHONE_NUMBER
      - CREDIT_CARD
      - US_SSN
      - LOCATION
      - IP_ADDRESS

workflow:
  _type: react_agent
  tool_names: [my_calculator, current_datetime]
  llm_name: nim_llm
  verbose: true
  parse_agent_response_max_retries: 3

