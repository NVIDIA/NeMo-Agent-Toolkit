function_groups:
  tavily:
    _type: tavily
    exclude: [crawl, map]

llms:
  anthropic_llm:
    _type: litellm
    # Routed via litellm; uses ANTHROPIC_API_KEY from env.
    model_name: anthropic/claude-sonnet-4-6

workflow:
  _type: react_agent
  llm_name: anthropic_llm
  tool_names:
    # Group reference auto-expands to selected tools
    - tavily
  verbose: true
  parse_agent_response_max_retries: 3
