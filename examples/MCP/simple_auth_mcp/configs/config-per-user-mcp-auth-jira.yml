# This config file shows how to use the MCP server to get the current date and time.
# Here the workflow acts as a MCP client and connects to the MCP server running
# on the specified URL. streamable-http is the recommended transport for HTTP-based
# connections, but sse is also supported for backwards compatibility.

# This config file shows -
# 1. how to use a local MCP server to get the current date and time using stdio transport.
# 2. how to access a remote MCP server using streamable-http transport for math operations.
#
# Terminal 1: Start server
# export CORPORATE_MCP_JIRA_URL="https://your-jira-mcp-url"
# nat serve --config_file examples/MCP/simple_auth_mcp/configs/config-mcp-auth-jira-per-user.yml

# # Terminal 2: Test requests
# # User Alice
# curl -X POST http://localhost:8000/generate \
#   -H "Content-Type: application/json" \
#   -H "Cookie: nat-session=user-alice" \
#   -d '{"messages": [{"role": "user", "content": "What is status of JIRA-123?"}]}'

# # User Bob (should have separate MCP client)
# curl -X POST http://localhost:8000/generate \
#   -H "Content-Type: application/json" \
#   -H "Cookie: nat-session=user-bob" \
#   -d '{"messages": [{"role": "user", "content": "What is status of JIRA-456?"}]}'

function_groups:
  mcp_jira:
    _type: per_user_mcp_client
    server:
      transport: streamable-http
      url: ${CORPORATE_MCP_JIRA_URL}
      auth_provider: mcp_oauth2_jira

authentication:
  mcp_oauth2_jira:
    _type: mcp_oauth2
    server_url: ${CORPORATE_MCP_JIRA_URL}
    # The difference is when the OAuth authentication happens:
    # Non-per-user workflow (nat run or nat serve with react_agent):
    # Authentication happens during startup, before the main server binds to port 8000
    # The ConsoleAuthenticationFlowHandler starts its temporary server on port 8000, completes OAuth, then stops it
    # Then the main server starts on port 8000 — no conflict
    # Per-user workflow (nat serve with per_user_react_agent):
    # Main server starts on port 8000 first (line 20 in your log: "Uvicorn running on http://localhost:8000")
    # Authentication happens per-request when a user (user-alice) makes their first API call
    # The MCPAuthenticationFlowHandler then tries to start another server on port 8000 → conflict
    # The fundamental issue is that per-user auth happens lazily at request time, after the main server is already running. The auth handler shouldn't be trying to spawn its own server in this scenario — it should reuse the existing FastAPI server's routes instead.
    redirect_uri: ${NAT_REDIRECT_URI:-http://localhost:8001/auth/redirect}
    default_user_id: ${NAT_USER_ID}
    allow_default_user_id_for_tool_calls: ${ALLOW_DEFAULT_USER_ID_FOR_TOOL_CALLS:-true}

llms:
  nim_llm:
    _type: nim
    model_name: meta/llama-3.1-70b-instruct
    temperature: 0.0
    max_tokens: 1024

workflow:
  _type: per_user_react_agent
  tool_names:
    - mcp_jira
  llm_name: nim_llm
  verbose: true
  retry_parsing_errors: true
  max_retries: 3
