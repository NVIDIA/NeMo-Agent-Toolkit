general:
  telemetry:
    tracing:
      phoenix:
        _type: phoenix
        endpoint: http://localhost:6006/v1/traces
        project: nat-relay-hermes

workflow:
  _type: hermes_agent
  command: uvx
  command_args: ["--from", "hermes-agent", "hermes"]
  working_directory: .
  relay_enabled: true
  relay_command: nemo-relay
  relay_atof_output_dir: ./.tmp/nat-relay-hermes-atof
  timeout_seconds: 300
  max_output_chars: 12000
