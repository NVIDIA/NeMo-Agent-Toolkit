[build-system]
build-backend = "setuptools.build_meta"
requires = ["setuptools>=64", "setuptools-scm>=8", "setuptools_dynamic_dependencies>=1.0.0"]

[tool.setuptools_scm]
git_describe_command = "git describe --long --first-parent"
root = "../../.."

[project]
name = "nat_multi_frameworks"
dynamic = ["version", "dependencies"]
requires-python = ">=3.11,<3.14"
description = "Custom NeMo Agent toolkit Workflow"
classifiers = ["Programming Language :: Python"]

[tool.setuptools_dynamic_dependencies]
dependencies = [
  "nvidia-nat[langchain,llama-index] == {version}",
  "arxiv>=2.1.3,<3.0.0",
  "beautifulsoup4~=4.13",
  "markdown-it-py~=3.0",
  "nvidia-haystack~=0.3.0",
  "openai~=1.106",
]

[tool.uv.sources]
nvidia-nat = { path = "../../..", editable = true }

[project.entry-points.'nat.components']
nat_multi_frameworks = "nat_multi_frameworks.register"
