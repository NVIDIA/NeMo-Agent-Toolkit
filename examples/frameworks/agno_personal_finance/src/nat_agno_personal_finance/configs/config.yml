functions:
  web_search_tool:
    _type: serp_api_tool
    api_key: ${SERP_API_KEY}

llms:
  nim_llm:
    _type: nim
    model_name: nvidia/nemotron-3-nano-30b-a3b
    max_tokens: 16384
    temperature: 0.0

workflow:
  _type: agno_personal_finance
  llm_name: nim_llm
  tools: [web_search_tool]
  parse_agent_response_max_retries: 3
