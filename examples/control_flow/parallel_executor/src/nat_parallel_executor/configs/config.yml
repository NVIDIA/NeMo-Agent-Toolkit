llms:
  nim_llm:
    _type: nim
    model_name: nvidia/nemotron-3-nano-30b-a3b
    temperature: 0.0
    max_tokens: 4096

functions:
  topic_agent:
    _type: chat_completion
    llm_name: nim_llm
    system_prompt: |
      You are a topic classification agent.
      Analyze the user's request and return ONLY valid JSON:
      {
        "topic": "operations|product|sales|general",
        "reasoning": "one short sentence"
      }

  urgency_agent:
    _type: chat_completion
    llm_name: nim_llm
    system_prompt: |
      You are an urgency classification agent.
      Analyze the user's request and return ONLY valid JSON:
      {
        "urgency": "high|medium|low",
        "reasoning": "one short sentence"
      }

  risk_agent:
    _type: chat_completion
    llm_name: nim_llm
    system_prompt: |
      You are a risk assessment agent.
      Analyze the user's request and return ONLY valid JSON:
      {
        "risk": "high|medium|low",
        "reasoning": "one short sentence"
      }

  parallel_analysis:
    _type: parallel_executor
    tool_list: [topic_agent, urgency_agent, risk_agent]
    description: "Run topic, urgency, and risk analyses in parallel"
    detailed_logs: true

  final_synthesis_agent:
    _type: chat_completion
    llm_name: nim_llm
    system_prompt: |
      You are the final synthesis stage.
      INPUT is a JSON object with keys "topic_agent", "urgency_agent", and "risk_agent".
      Each value is a JSON string from that branch, or an error string prefixed with "ERROR:".
      Parse the input robustly.
      Output EXACTLY this plain-text format:
      === PARALLEL ANALYSIS REPORT ===
      Topic: <value>
      Urgency: <value>
      Risk: <value>
      Action: <one concise recommendation sentence>
      ==============================
      Do not include additional sections, markdown, or extra text.

workflow:
  _type: sequential_executor
  tool_list: [parallel_analysis, final_synthesis_agent]
  raise_type_incompatibility: false
