init_by_lua 'proxied_openai_base_url = os.getenv("NAT_PROXIED_OPENAI_BASE_URL")';

server {
    listen                  8000;
    listen                  [::]:8000;
    server_name             _;

    resolver local=on;
    location / {

        set_by_lua $proxied_openai_base_url 'return proxied_openai_base_url';
        # Rewrite JSON body: set model to "openai/openai/<model>"
        access_by_lua_block {
            if ngx.req.get_method() ~= "POST" then
                return
            end
            ngx.req.read_body()
            local body = ngx.req.get_body_data()
            if not body or body == "" then
                return
            end
            local cjson = require "cjson"
            local ok, data = pcall(cjson.decode, body)
            if not ok or type(data) ~= "table" or not data.model then
                return
            end
            local new_model = "openai/openai/" .. data.model
            ngx.log(ngx.ERR, "New model: ", new_model)
            data.model = new_model
            local new_payload = cjson.encode(data)
            ngx.log(ngx.ERR, "Encoded data: ", new_payload)
            ngx.req.set_body_data(new_payload)
        }

        proxy_pass $proxied_openai_base_url;
        proxy_ssl_server_name on;
        # Increase timeouts to 300 seconds (5 minutes)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_set_header Authorization $http_authorization;
    }
}