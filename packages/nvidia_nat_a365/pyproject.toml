[build-system]
build-backend = "setuptools.build_meta"
requires = ["setuptools>=64", "setuptools-scm>=8", "setuptools_dynamic_dependencies>=1.0.0"]


[tool.setuptools.packages.find]
where = ["src"]
include = ["nat.*"]


[tool.setuptools_scm]
git_describe_command = "git describe --long --first-parent"
root = "../.."


[project]
name = "nvidia-nat-a365"
dynamic = ["version", "dependencies", "optional-dependencies"]
    requires-python = ">=3.11,<3.13"  # Temporarily exclude 3.13 until nvidia-nat-mcp dev builds support it
description = "Subpackage for Microsoft Agent 365 integration in NeMo Agent Toolkit (telemetry, tooling, notifications)"
readme = "src/nat/meta/pypi.md"
keywords = ["ai", "observability", "agent365", "azure", "microsoft", "teams", "office365"]
license = { text = "Apache-2.0" }
authors = [{ name = "NVIDIA Corporation" }]
maintainers = [{ name = "NVIDIA Corporation" }]
classifiers = [
  "Programming Language :: Python",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]

[project.urls]
documentation = "https://docs.nvidia.com/nemo/agent-toolkit/latest/"
source = "https://github.com/NVIDIA/NeMo-Agent-Toolkit"

[tool.setuptools_dynamic_dependencies]
dependencies = [
  # Keep package version constraints as open as possible to avoid conflicts with other packages. Always define a minimum
  # version when adding a new package. If unsure, default to using `~=` instead of `==`. Does not apply to nvidia-nat packages.
  # Keep sorted!!!
  "microsoft-agents-a365-notifications~=0.1.0",
  "microsoft-agents-a365-observability-core~=0.1.0",
  "microsoft-agents-a365-tooling~=0.1.0",
  "microsoft-agents-activity~=0.7.0",
  "microsoft-agents-hosting-aiohttp~=0.7.0",
  "microsoft-agents-hosting-core~=0.7.0",
  "nvidia-nat-core == {version}",
  "nvidia-nat-opentelemetry == {version}",
]

[tool.setuptools_dynamic_dependencies.optional-dependencies]
test = [
  "nvidia-nat-test == {version}",
]
mcp = [
  "nvidia-nat-mcp == {version}",
]

[tool.uv]
build-constraint-dependencies = ["setuptools>=64", "setuptools-scm>=8", "setuptools_dynamic_dependencies>=1.0.0"]
managed = true
config-settings = { editable_mode = "compat" }

[tool.uv.sources]
nvidia-nat-core = { path = "../nvidia_nat_core", editable = true }
nvidia-nat-mcp = { path = "../nvidia_nat_mcp", editable = true }
nvidia-nat-opentelemetry = { path = "../nvidia_nat_opentelemetry", editable = true }
nvidia-nat-test = { path = "../nvidia_nat_test", editable = true }

[project.entry-points.'nat.components']
nat_a365 = "nat.plugins.a365.register"
nat_a365_telemetry = "nat.plugins.a365.telemetry.register"

[project.entry-points.'nat.front_ends']
nat_a365 = "nat.plugins.a365.front_end.register"
