# Agent Leaderboard v2 evaluation config for NAT
# Usage: nat eval --config_file packages/nvidia_nat_benchmarks/configs/agent_leaderboard_eval.yaml
#
# Prerequisite: Download dataset first:
#   python examples/dynamo_integration/scripts/download_agent_leaderboard_v2.py \
#     --output-dir data/agent_leaderboard --domains banking healthcare insurance investment telecom
#
# Required env vars:
#   NVIDIA_API_KEY — API key for NVIDIA NIM endpoint
#   AGENT_LEADERBOARD_DATA — path to downloaded JSON file (or will download from HuggingFace)

llms:
  nim_llm:
    _type: nim
    model_name: meta/llama-3.3-70b-instruct
    base_url: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
    api_key: ${NVIDIA_API_KEY}
    max_tokens: 1024
    temperature: 0.0

workflow:
  _type: agent_leaderboard_workflow
  llm_name: nim_llm
  max_steps: 10

eval:
  general:
    output_dir: .tmp/nat/benchmarks/agent_leaderboard/output/
    workflow_alias: agent_leaderboard_llama33_70b
    per_input_user_id: false
    max_concurrency: 5
    dataset:
      _type: agent_leaderboard
      file_path: ${AGENT_LEADERBOARD_DATA:-./data/agent_leaderboard/agent_leaderboard_v2_banking.json}
      domains:
        - banking
      structure:
        question_key: question
        answer_key: answer
        disable: true

  evaluators:
    tsq:
      _type: agent_leaderboard_tsq
      tool_weight: 1.0
      parameter_weight: 0.0
