# ToolTalk benchmark evaluation config for NAT
# Usage: nat eval --config-file packages/nvidia_nat_benchmarks/configs/tooltalk_eval.yaml
#
# Required env vars (can be set in .env):
#   NVIDIA_API_KEY       — API key for NVIDIA NIM endpoint
#   TOOLTALK_DATABASE_DIR — path to ToolTalk database dir (e.g. .venv/.../tooltalk/data/databases)
#   TOOLTALK_DATASET_DIR  — path to ToolTalk dataset dir (e.g. .venv/.../tooltalk/data/easy)

llms:
  nim_llm:
    _type: nim
    model_name: meta/llama-3.3-70b-instruct
    base_url: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
    api_key: ${NVIDIA_API_KEY}
    max_tokens: 1024
    temperature: 0.0

workflow:
  _type: tooltalk_workflow
  llm_name: nim_llm
  database_dir: ${TOOLTALK_DATABASE_DIR}
  api_mode: all
  disable_documentation: false

eval:
  general:
    output_dir: .tmp/nat/benchmarks/tooltalk/output/
    workflow_alias: tooltalk_llama33_70b
    per_input_user_id: true
    max_concurrency: 3
    dataset:
      _type: tooltalk
      file_path: ${TOOLTALK_DATASET_DIR}
      database_dir: ${TOOLTALK_DATABASE_DIR}
      structure:
        question_key: question
        answer_key: answer

  evaluators:
    tooltalk:
      _type: tooltalk_evaluator
      database_dir: ${TOOLTALK_DATABASE_DIR}
