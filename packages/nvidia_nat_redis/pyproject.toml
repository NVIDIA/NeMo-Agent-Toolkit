[build-system]
build-backend = "setuptools.build_meta"
requires = ["setuptools>=64", "setuptools-scm>=8"]


[tool.setuptools]
packages = []


[tool.setuptools_scm]
git_describe_command = "git describe --long --first-parent"
root = "../.."


[project]
name = "nvidia-nat-redis"
dynamic = ["version"]
requires-python = ">=3.11,<3.14"
description = "Compatibility package for the Redis integration in NeMo Agent Toolkit"
readme = "src/nat/meta/pypi.md"
keywords = ["ai", "agents", "memory"]
license = { text = "Apache-2.0" }
authors = [{ name = "NVIDIA Corporation" }]
maintainers = [{ name = "NVIDIA Corporation" }]
classifiers = [
  "Programming Language :: Python",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
]
dependencies = [
  "nemo-agent-toolkit-redis>=0.1.0,<2.0.0",
]

[project.urls]
documentation = "https://docs.nvidia.com/nemo/agent-toolkit/latest/"
source = "https://github.com/NVIDIA/NeMo-Agent-Toolkit"

[tool.uv]
build-constraint-dependencies = ["setuptools>=64", "setuptools-scm>=8"]
managed = true
config-settings = { editable_mode = "compat" }

[tool.uv.sources]
nemo-agent-toolkit-redis = { path = "../../../nemo-agent-toolkit-redis-fork", editable = true }
